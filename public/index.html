<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>rec.relay</title>
  <meta name="description" content="Record on mobile, land on PC, over LAN.">
  <link rel="stylesheet" href="styles.css?v=3.3.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

  <div class="mobile-container">

    <!-- Header -->
    <div style="text-align: center; padding: var(--space-4) 0;">
      <h1 style="color: var(--color-primary);">rec.relay</h1>
      <p style="font-size: 11px; color: var(--ink-muted); margin-top: var(--space-1);">record on mobile, land on PC</p>
    </div>

    <!-- Connection status -->
    <div id="connection-banner" class="card" style="margin-bottom: var(--space-4); text-align: center; padding: var(--space-3); display: flex; flex-direction: column; align-items: center; gap: var(--space-2);">
      <div style="display: flex; align-items: center; justify-content: center; gap: var(--space-2);">
        <span class="status-dot waiting"></span>
        <span id="connection-text" style="font-size: 13px; color: var(--ink-secondary);">Connecting to PC...</span>
      </div>
      <button id="btn-scan-qr" class="btn btn-secondary btn-small" style="display: none; margin-top: 4px;">
        <i class="ti ti-camera"></i> Scan PC QR Code
      </button>
    </div>

    <!-- Viewfinder -->
    <div class="viewfinder-wrap">
      <video id="viewfinder" autoplay playsinline muted class="mirrored"></video>

      <div class="viewfinder-overlay">
        <!-- Top row: status + timer -->
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <span id="rec-status" class="badge badge-idle">ready</span>
          <span id="rec-timer" style="font-family: var(--font-mono); font-size: 13px; color: #fff; display: none;">00:00</span>
        </div>

        <!-- Upload progress overlay -->
        <div id="upload-overlay" class="upload-overlay">
          <p style="font-size: 13px; color: var(--ink-secondary); margin-bottom: var(--space-2);">Sending to PC...</p>
          <p id="upload-pct" style="font-size: 18px; font-weight: 500; color: var(--color-primary);">0%</p>
          <div class="progress-bar" style="margin-top: var(--space-2);">
            <div id="upload-bar" class="progress-fill"></div>
          </div>
        </div>

        <!-- Success overlay -->
        <div id="success-overlay" class="upload-overlay" style="display: none;">
          <p style="font-size: 18px; color: var(--color-primary); margin-bottom: var(--space-1);">&#10003;</p>
          <p style="font-size: 13px; color: var(--ink-primary); margin-bottom: var(--space-4);">Landed on PC</p>
          <div style="display: flex; flex-direction: column; gap: var(--space-2);">
            <button id="btn-new" class="btn btn-primary" style="width: 100%;">Record another</button>
            <button id="btn-close-success" class="btn btn-secondary" style="width: 100%;">Close</button>
          </div>
        </div>

        <div></div>
      </div>
    </div>

    <!-- Zoom Control Slider -->
    <div id="zoom-control-wrap" style="display: none; align-items: center; justify-content: center; gap: var(--space-2); margin: var(--space-3) 0; padding: 0 var(--space-4);">
      <i class="ti ti-zoom-out" style="font-size: 14px; color: var(--ink-secondary);"></i>
      <input type="range" id="zoom-slider" min="1" max="5" step="0.1" value="1" style="flex: 1; accent-color: var(--color-primary); cursor: pointer; height: 4px; border-radius: var(--radius-sm);">
      <i class="ti ti-zoom-in" style="font-size: 14px; color: var(--ink-secondary);"></i>
    </div>

    <!-- Controls -->
    <div class="controls-row">
      <div class="control-slot left">
        <button id="btn-flip" class="circle-btn" title="Flip camera">
          <i class="ti ti-refresh"></i>
        </button>
      </div>

      <div class="control-slot center">
        <div class="record-btn-container disabled">
          <button id="btn-record" class="record-btn" disabled>
            <div class="record-btn-inner"></div>
          </button>
        </div>
      </div>

      <div class="control-slot right">
        <button id="btn-pause" class="circle-btn" disabled title="Pause recording">
          <i class="ti ti-player-pause"></i>
        </button>
        <button id="btn-upload" class="circle-btn" style="background: var(--color-upload-bg); border-color: var(--color-primary); color: var(--color-primary); display: none;" title="Send to PC">
          <i class="ti ti-upload"></i>
        </button>
      </div>
    </div>

    <!-- Divider and Metadata Input Area -->
    <div style="border-top: 0.5px dashed var(--color-border); margin-top: var(--space-4); padding-top: var(--space-4);">
      <div id="btn-toggle-metadata" style="display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none;">
        <span style="font-size: 11px; color: var(--ink-secondary); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600;">Clip Metadata (Optional)</span>
        <span id="metadata-toggle-icon" style="font-size: 14px; color: var(--ink-muted); transition: transform var(--duration-base); display: inline-flex;"><i class="ti ti-chevron-down"></i></span>
      </div>

      <div id="mobile-metadata-inputs" style="display: none;">
        <div class="mobile-input-group" style="margin-top: var(--space-3); margin-bottom: var(--space-3);">
          <label style="display: block; font-size: 10px; color: var(--ink-muted); text-transform: uppercase; margin-bottom: 4px; font-weight: 600;">Comment</label>
          <textarea id="mobile-input-comment" placeholder="Add details or notes about this clip..." style="width: 100%; height: 72px; font-family: var(--font-mono); font-size: 12px; padding: var(--space-2); background: var(--color-surface); border: 0.5px solid var(--color-border); border-radius: var(--radius-sm); color: var(--ink-primary); outline: none; resize: none;"></textarea>
        </div>

        <div class="mobile-input-group" style="margin-bottom: var(--space-3);">
          <label style="display: block; font-size: 10px; color: var(--ink-muted); text-transform: uppercase; margin-bottom: 4px; font-weight: 600;">Tags (comma-separated)</label>
          <input type="text" id="mobile-input-tags" placeholder="e.g. vocals, practice, draft" style="width: 100%; font-family: var(--font-mono); font-size: 12px; padding: var(--space-2); background: var(--color-surface); border: 0.5px solid var(--color-border); border-radius: var(--radius-sm); color: var(--ink-primary); outline: none;">
        </div>

        <div class="mobile-input-group" style="margin-bottom: var(--space-3);">
          <label style="display: block; font-size: 10px; color: var(--ink-muted); text-transform: uppercase; margin-bottom: 4px; font-weight: 600;">Music Reference Link (Spotify / Apple Music)</label>
          <input type="text" id="mobile-input-music" placeholder="Paste track or album link..." style="width: 100%; font-family: var(--font-mono); font-size: 12px; padding: var(--space-2); background: var(--color-surface); border: 0.5px solid var(--color-border); border-radius: var(--radius-sm); color: var(--ink-primary); outline: none;">
        </div>
      </div>
    </div>

    <!-- Version footer -->
    <div style="text-align: center; margin-top: auto; padding: var(--space-4) 0 0 0; font-size: 10px; color: var(--ink-muted); font-family: var(--font-mono);">
      v3.3.0
    </div>

  </div>

  <!-- QR Scanner Modal -->
  <div id="scanner-modal" class="qr-modal">
    <div class="qr-modal-content">
      <h2 style="font-size: 16px; margin-bottom: var(--space-3); font-weight: 500;">Scan PC QR Code</h2>
      <p style="font-size: 11px; color: var(--ink-secondary); margin-bottom: var(--space-4);">Position the PC dashboard QR code inside the viewfinder</p>
      
      <div id="scanner-container" style="position: relative; width: 100%; aspect-ratio: 1; background: #000; border-radius: var(--radius-md); overflow: hidden; margin-bottom: var(--space-4);">
        <video id="scanner-video" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
        <!-- Scanner guide box overlay -->
        <div style="position: absolute; inset: 0; border: 4px solid rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; pointer-events: none;">
          <div style="width: 70%; height: 70%; border: 2px solid var(--color-primary); box-shadow: 0 0 0 9999px rgba(0,0,0,0.3); border-radius: var(--radius-md);"></div>
        </div>
      </div>

      <button id="btn-close-scanner" class="btn btn-ghost" style="width: 100%;">Cancel</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast">
    <span id="toast-msg"></span>
  </div>

  <!-- PeerJS & jsQR -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

  <script>
    // ── Version ───────────────────────────────────────────────────
    const APP_VERSION = '3.3.0';

    // ── Elements ──────────────────────────────────────────────────
    const viewfinder     = document.getElementById('viewfinder');
    const recordBtn      = document.getElementById('btn-record');
    const uploadBtn      = document.getElementById('btn-upload');
    const flipBtn        = document.getElementById('btn-flip');
    const pauseBtn       = document.getElementById('btn-pause');
    const recStatus      = document.getElementById('rec-status');
    const recTimer       = document.getElementById('rec-timer');
    const uploadOverlay  = document.getElementById('upload-overlay');
    const uploadBar      = document.getElementById('upload-bar');
    const uploadPct      = document.getElementById('upload-pct');
    const successOverlay = document.getElementById('success-overlay');
    const btnNew         = document.getElementById('btn-new');
    const btnCloseSuccess = document.getElementById('btn-close-success');
    const connBanner     = document.getElementById('connection-banner');
    const connText       = document.getElementById('connection-text');
    const connDot        = connBanner.querySelector('.status-dot');

    const zoomControlWrap = document.getElementById('zoom-control-wrap');
    const zoomSlider      = document.getElementById('zoom-slider');
    const toast           = document.getElementById('toast');
    const toastMsg        = document.getElementById('toast-msg');

    // Scanner Elements
    const scannerModal   = document.getElementById('scanner-modal');
    const scannerVideo   = document.getElementById('scanner-video');
    const btnScanQr      = document.getElementById('btn-scan-qr');
    const btnCloseScanner = document.getElementById('btn-close-scanner');

    // ── State ─────────────────────────────────────────────────────
    let mediaStream   = null;
    let mediaRecorder = null;
    let chunks        = [];
    let isRecording   = false;
    let isPaused      = false;
    let facingMode    = 'user';
    let timerInterval = null;
    let seconds       = 0;
    let peerConn      = null; // WebRTC data connection to PC
    let videoDevices  = [];
    let currentDeviceIndex = 0;
    let isInitializingCamera = false;
    let isFrontCamera = false;
    let canvasAnimFrame = null;

    // ── Helpers ───────────────────────────────────────────────────
    function getFriendlyCameraName(label, index) {
      if (!label) return `Camera ${index + 1}`;
      let name = label;
      if (label.toLowerCase().includes('front')) {
        name = 'Front Camera';
      } else if (label.toLowerCase().includes('back') || label.toLowerCase().includes('rear')) {
        if (label.toLowerCase().includes('wide')) {
          name = 'Back Camera (Ultra Wide)';
        } else if (label.toLowerCase().includes('telephoto')) {
          name = 'Back Camera (Telephoto)';
        } else {
          name = 'Back Camera';
        }
      }
      return name;
    }

    let toastTimeout = null;
    function showMobileToast(msg) {
      if (!toastMsg || !toast) return;
      if (toastTimeout) {
        clearTimeout(toastTimeout);
      }
      toastMsg.textContent = msg;
      toast.classList.add('show');
      toastTimeout = setTimeout(() => {
        toast.classList.remove('show');
        toastTimeout = null;
      }, 3000);
    }

    function setRecordButtonDisabled(state) {
      recordBtn.disabled = state;
      const container = document.querySelector('.record-btn-container');
      if (container) {
        if (state) {
          container.classList.add('disabled');
        } else {
          container.classList.remove('disabled');
        }
      }
    }

    // ── WebRTC: connect to PC peer ────────────────────────────────
    let peer = null;

    function connectToPC(targetPeerId) {
      if (peerConn) {
        try { peerConn.close(); } catch(e){}
        peerConn = null;
      }
      if (peer) {
        try { peer.destroy(); } catch(e){}
        peer = null;
      }

      connDot.className = 'status-dot waiting';
      connText.textContent = 'Connecting to PC...';
      btnScanQr.style.display = 'none';
      setRecordButtonDisabled(true);

      peer = new Peer();

      peer.on('open', () => {
        peerConn = peer.connect(targetPeerId, { reliable: true });

        peerConn.on('open', () => {
          connDot.className = 'status-dot connected';
          connText.textContent = 'Connected to PC';
          btnScanQr.style.display = 'none';
          setRecordButtonDisabled(false);
        });

        peerConn.on('close', () => {
          connDot.className = 'status-dot disconnected';
          connText.textContent = 'Disconnected from PC';
          btnScanQr.style.display = 'inline-flex';
          setRecordButtonDisabled(true);
        });

        peerConn.on('error', (err) => {
          console.error('PeerJS connection error:', err);
          connDot.className = 'status-dot disconnected';
          connText.textContent = 'Connection error';
          btnScanQr.style.display = 'inline-flex';
          setRecordButtonDisabled(true);
        });
      });

      peer.on('error', (err) => {
        console.error('PeerJS error:', err);
        connDot.className = 'status-dot disconnected';
        btnScanQr.style.display = 'inline-flex';
        setRecordButtonDisabled(true);
        if (err.type === 'peer-unavailable') {
          connText.textContent = 'PC offline. Reload PC dashboard and scan new QR.';
        } else if (err.type === 'network') {
          connText.textContent = 'Network error. Check Wi-Fi / connection.';
        } else {
          connText.textContent = `Error: ${err.type}`;
        }
      });
    }

    // ── QR Scanner logic ──────────────────────────────────────────
    let scannerStream = null;
    let scannerAnimationFrame = null;

    async function startScanner() {
      // Release main camera first so scanner can access the hardware
      if (mediaStream) {
        mediaStream.getTracks().forEach(t => t.stop());
        mediaStream = null;
      }
      scannerModal.style.display = 'flex';
      try {
        try {
          scannerStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 640 } }
          });
        } catch (e) {
          console.warn("Environment camera failed, falling back to default camera:", e);
          scannerStream = await navigator.mediaDevices.getUserMedia({
            video: { width: { ideal: 640 }, height: { ideal: 640 } }
          });
        }
        scannerVideo.srcObject = scannerStream;
        
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        function scanFrame() {
          if (scannerVideo.readyState === scannerVideo.HAVE_ENOUGH_DATA) {
            canvas.width = scannerVideo.videoWidth;
            canvas.height = scannerVideo.videoHeight;
            ctx.drawImage(scannerVideo, 0, 0, canvas.width, canvas.height);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height, {
              inversionAttempts: "dontInvert",
            });

            if (code) {
              const match = code.data.match(/[?&]peerId=([^&]+)/);
              if (match) {
                const scannedPeerId = match[1];
                stopScanner();
                const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?peerId=' + scannedPeerId;
                window.history.pushState({ path: newUrl }, '', newUrl);
                connectToPC(scannedPeerId);
                return;
              }
            }
          }
          scannerAnimationFrame = requestAnimationFrame(scanFrame);
        }
        
        scannerAnimationFrame = requestAnimationFrame(scanFrame);
      } catch (err) {
        console.error('Scanner error:', err);
        alert('Could not access camera for scanning: ' + err.message);
        stopScanner();
      }
    }

    function stopScanner() {
      scannerModal.style.display = 'none';
      if (scannerStream) {
        scannerStream.getTracks().forEach(t => t.stop());
        scannerStream = null;
      }
      if (scannerAnimationFrame) {
        cancelAnimationFrame(scannerAnimationFrame);
        scannerAnimationFrame = null;
      }
      initCamera();
    }

    // Initial connection run
    const params = new URLSearchParams(window.location.search);
    const pcPeerId = params.get('peerId');
    const targetVersion = params.get('v');

    if (targetVersion && targetVersion !== APP_VERSION) {
      connDot.className = 'status-dot disconnected';
      connText.innerHTML = `Cached mobile app detected (${APP_VERSION}).<br><a href="#" onclick="window.location.reload(true); return false;" style="text-decoration:underline;color:var(--color-primary);font-weight:bold;display:inline-block;margin-top:4px;">Tap here to Force Reload</a>`;
      setRecordButtonDisabled(true);
    } else if (!pcPeerId) {
      connDot.className = 'status-dot disconnected';
      connText.textContent = 'No peer ID found. Scan QR to connect.';
      btnScanQr.style.display = 'inline-flex';
    } else {
      connectToPC(pcPeerId);
    }

    // ── Camera ────────────────────────────────────────────────────
    async function enumerateCameras() {
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        videoDevices = devices.filter(device => device.kind === 'videoinput');
        console.log('Available video devices:', videoDevices);
      } catch (err) {
        console.error('Error enumerating devices:', err);
      }
    }

    function setupZoom(track) {
      if (!track) {
        zoomControlWrap.style.display = 'none';
        return;
      }
      
      const capabilities = typeof track.getCapabilities === 'function' ? track.getCapabilities() : {};
      
      if (capabilities.zoom) {
        zoomControlWrap.style.display = 'flex';
        zoomSlider.min = capabilities.zoom.min || 1;
        zoomSlider.max = capabilities.zoom.max || 5;
        zoomSlider.step = capabilities.zoom.step || 0.1;
        
        const settings = track.getSettings();
        zoomSlider.value = settings.zoom || capabilities.zoom.min || 1;
        
        zoomSlider.oninput = async (e) => {
          const val = parseFloat(e.target.value);
          try {
            await track.applyConstraints({
              advanced: [{ zoom: val }]
            });
          } catch (err) {
            console.error('Error applying zoom constraint:', err);
          }
        };
      } else {
        zoomControlWrap.style.display = 'none';
      }
    }

    async function initCamera() {
      if (isInitializingCamera) return;
      isInitializingCamera = true;

      // 1. Release previous stream and wait for hardware to cool down (essential for iOS camera cycling)
      if (mediaStream) {
        mediaStream.getTracks().forEach(t => t.stop());
        mediaStream = null;
        await new Promise(r => setTimeout(r, 250));
      }
      
      flipBtn.disabled = true; // Prevent click spamming during loading
      recStatus.textContent = 'loading camera...';
      recStatus.className = 'badge badge-idle';

      try {
        let constraints = {
          audio: true,
          video: {
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        };

        if (videoDevices.length > 0) {
          const selectedDevice = videoDevices[currentDeviceIndex];
          // Use standard deviceId constraint (soft match) instead of { exact } constraint
          // to prevent camera start rejection on budget/strict mobile browsers
          constraints.video.deviceId = selectedDevice.deviceId;
        } else {
          constraints.video.facingMode = facingMode;
        }

        try {
          mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
        } catch (err) {
          console.warn('Initial getUserMedia constraints failed, trying fallback constraints:', err);
          // Fallback: try video-only (without audio) and simple device selectors to bypass mic block or aspect failures
          const fallbackConstraints = {
            audio: false,
            video: videoDevices.length > 0
              ? { deviceId: videoDevices[currentDeviceIndex].deviceId }
              : { facingMode }
          };
          mediaStream = await navigator.mediaDevices.getUserMedia(fallbackConstraints);
        }

        viewfinder.srcObject = mediaStream;

        const activeTrack = mediaStream.getVideoTracks()[0];
        const settings = activeTrack ? activeTrack.getSettings() : {};
        const label = (activeTrack && activeTrack.label) ? activeTrack.label.toLowerCase() : '';
        
        isFrontCamera = (settings.facingMode === 'user') || label.includes('front') || (videoDevices.length <= 1 && facingMode === 'user');
        
        // Restore mirroring class to viewfinder preview if we are using the front camera
        viewfinder.classList.toggle('mirrored', isFrontCamera);

        if (videoDevices.length === 0) {
          await enumerateCameras();
          if (activeTrack && videoDevices.length > 0) {
            const activeDeviceId = settings.deviceId;
            const index = videoDevices.findIndex(d => d.deviceId === activeDeviceId);
            if (index !== -1) {
              currentDeviceIndex = index;
            }
          }
        }

        setupZoom(activeTrack);

        flipBtn.disabled = false;
        recStatus.textContent = isRecording ? 'rec' : (isPaused ? 'paused' : 'ready');
        recStatus.className = isRecording ? 'badge badge-error' : 'badge badge-idle';

      } catch (err) {
        console.error('Camera error:', err);
        recStatus.textContent = 'camera blocked';
        recStatus.className = 'badge badge-error';
        flipBtn.disabled = false;
      } finally {
        isInitializingCamera = false;
      }
    }

    flipBtn.addEventListener('click', async () => {
      if (isRecording) return;
      if (videoDevices.length > 1) {
        currentDeviceIndex = (currentDeviceIndex + 1) % videoDevices.length;
        const device = videoDevices[currentDeviceIndex];
        const friendlyName = getFriendlyCameraName(device.label, currentDeviceIndex);
        showMobileToast(`Switched to: ${friendlyName}`);
      } else {
        facingMode = facingMode === 'user' ? 'environment' : 'user';
        showMobileToast(`Switched camera mode`);
      }
      await initCamera();
    });

    // ── Recording ─────────────────────────────────────────────────
    recordBtn.addEventListener('click', () => {
      isRecording ? stopRecording() : startRecording();
    });

    function startRecording() {
      if (!mediaStream) return;
      if (!peerConn || !peerConn.open) {
        connDot.className = 'status-dot disconnected';
        connText.textContent = 'Not connected to PC';
        setRecordButtonDisabled(true);
        return;
      }
      chunks = [];

      let opts = { mimeType: 'video/webm;codecs=vp9,opus' };
      if (!MediaRecorder.isTypeSupported(opts.mimeType)) {
        opts = { mimeType: 'video/webm;codecs=vp8,opus' };
        if (!MediaRecorder.isTypeSupported(opts.mimeType)) {
          opts = { mimeType: 'video/webm' };
          if (!MediaRecorder.isTypeSupported(opts.mimeType)) {
            opts = { mimeType: 'video/mp4' };
          }
        }
      }

      isRecording = true;
      isPaused = false;

      let recordingStream = mediaStream;
      if (isFrontCamera) {
        const width = viewfinder.videoWidth || 1280;
        const height = viewfinder.videoHeight || 720;
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');

        function drawCanvasFrame() {
          if (!isRecording) return;
          ctx.save();
          ctx.translate(width, 0);
          ctx.scale(-1, 1);
          ctx.drawImage(viewfinder, 0, 0, width, height);
          ctx.restore();
          canvasAnimFrame = requestAnimationFrame(drawCanvasFrame);
        }

        canvasAnimFrame = requestAnimationFrame(drawCanvasFrame);

        const canvasStream = canvas.captureStream(30);
        const audioTracks = mediaStream.getAudioTracks();
        if (audioTracks.length > 0) {
          audioTracks.forEach(track => {
            canvasStream.addTrack(track);
          });
        }
        recordingStream = canvasStream;
      }

      try {
        try { mediaRecorder = new MediaRecorder(recordingStream, opts); }
        catch { mediaRecorder = new MediaRecorder(recordingStream); }
      } catch (err) {
        console.error('MediaRecorder initialization failed:', err);
        showMobileToast('Error starting recording: ' + err.message);
        isRecording = false;
        if (canvasAnimFrame) {
          cancelAnimationFrame(canvasAnimFrame);
          canvasAnimFrame = null;
        }
        return;
      }

      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      mediaRecorder.onstop = () => {
        recStatus.textContent = 'stopped';
        recStatus.className = 'badge badge-idle';
        uploadBtn.style.display = 'inline-flex';
      };

      mediaRecorder.start(250);
      document.querySelector('.mobile-container').classList.add('recording');
      recStatus.textContent = 'rec';
      recStatus.className = 'badge badge-error';

      // Enable dedicated pause button in right slot
      pauseBtn.disabled = false;
      pauseBtn.innerHTML = '<i class="ti ti-player-pause"></i>';
      pauseBtn.style.display = 'inline-flex';
      uploadBtn.style.display = 'none';

      seconds = 0;
      recTimer.textContent = '00:00';
      recTimer.style.display = 'block';
      timerInterval = setInterval(() => {
        if (!isPaused) {
          seconds++;
          recTimer.textContent = `${String(Math.floor(seconds / 60)).padStart(2, '0')}:${String(seconds % 60).padStart(2, '0')}`;
        }
      }, 1000);

      uploadBtn.style.display = 'none';
      successOverlay.style.display = 'none';
    }

    function stopRecording() {
      if (!mediaRecorder || mediaRecorder.state === 'inactive') return;
      mediaRecorder.stop();
      isRecording = false;
      isPaused = false;
      document.querySelector('.mobile-container').classList.remove('recording');
      
      if (canvasAnimFrame) {
        cancelAnimationFrame(canvasAnimFrame);
        canvasAnimFrame = null;
      }

      // Hide pause, show upload button in right slot
      pauseBtn.disabled = true;
      pauseBtn.style.display = 'none';
      uploadBtn.style.display = 'inline-flex';
      
      clearInterval(timerInterval);
      recTimer.style.display = 'none';
    }

    // ── Upload via WebRTC ─────────────────────────────────────────
    uploadBtn.addEventListener('click', async () => {
      if (!chunks.length || !peerConn || !peerConn.open) return;

      const commentVal = document.getElementById('mobile-input-comment').value.trim();
      const tagsVal = document.getElementById('mobile-input-tags').value;
      const musicVal = document.getElementById('mobile-input-music').value.trim();

      const tagsArray = tagsVal.split(',')
        .map(t => t.trim())
        .filter(t => t.length > 0);

      const mime = mediaRecorder?.mimeType || 'video/webm';
      const ext = mime.includes('mp4') ? 'mp4' : 'webm';
      const blob = new Blob(chunks, { type: mime });
      const arrayBuffer = await blob.arrayBuffer();

      uploadBtn.style.display = 'none';
      uploadOverlay.style.display = 'block';
      setRecordButtonDisabled(true);
      flipBtn.disabled = true;

      // Send metadata first
      peerConn.send(JSON.stringify({
        type: 'file-start',
        filename: `recording-${Date.now()}.${ext}`,
        mimeType: mime,
        totalSize: arrayBuffer.byteLength,
        comment: commentVal,
        tags: tagsArray,
        musicLink: musicVal
      }));

      // Send in 64KB chunks
      const CHUNK = 64 * 1024;
      let sent = 0;
      for (let offset = 0; offset < arrayBuffer.byteLength; offset += CHUNK) {
        const slice = arrayBuffer.slice(offset, Math.min(offset + CHUNK, arrayBuffer.byteLength));
        peerConn.send(slice);
        sent += slice.byteLength;
        const pct = Math.round((sent / arrayBuffer.byteLength) * 100);
        uploadBar.style.width = `${pct}%`;
        uploadPct.textContent = `${pct}%`;

        // Yield to browser to keep UI responsive
        if (offset % (CHUNK * 4) === 0) await new Promise(r => setTimeout(r, 0));
      }

      peerConn.send(JSON.stringify({ type: 'file-end' }));

      // Show success
      uploadOverlay.style.display = 'none';
      successOverlay.style.display = 'block';
      recStatus.textContent = 'sent';
      recStatus.className = 'badge badge-upload';
      setRecordButtonDisabled(false);
      flipBtn.disabled = false;
      chunks = [];

      // Reset right slot controls
      pauseBtn.disabled = true;
      pauseBtn.innerHTML = '<i class="ti ti-player-pause"></i>';
      pauseBtn.style.display = 'inline-flex';
      uploadBtn.style.display = 'none';
    });

    // ── New recording / Close ─────────────────────────────────────
    function resetRecorderState() {
      successOverlay.style.display = 'none';
      recStatus.textContent = 'ready';
      recStatus.className = 'badge badge-idle';
      uploadBar.style.width = '0%';
      uploadPct.textContent = '0%';
      pauseBtn.disabled = true;
      pauseBtn.innerHTML = '<i class="ti ti-player-pause"></i>';
      pauseBtn.style.display = 'inline-flex';
      uploadBtn.style.display = 'none';

      // Reset mobile metadata inputs
      document.getElementById('mobile-input-comment').value = '';
      document.getElementById('mobile-input-tags').value = '';
      document.getElementById('mobile-input-music').value = '';
    }

    // ── Pause / Resume Event ──────────────────────────────────────
    pauseBtn.addEventListener('click', () => {
      if (!isRecording || !mediaRecorder) return;
      
      if (!isPaused) {
        mediaRecorder.pause();
        isPaused = true;
        recStatus.textContent = 'paused';
        recStatus.className = 'badge badge-idle';
        pauseBtn.innerHTML = '<i class="ti ti-player-play"></i>';
      } else {
        mediaRecorder.resume();
        isPaused = false;
        recStatus.textContent = 'rec';
        recStatus.className = 'badge badge-error';
        pauseBtn.innerHTML = '<i class="ti ti-player-pause"></i>';
      }
    });

    btnNew.addEventListener('click', resetRecorderState);
    btnCloseSuccess.addEventListener('click', resetRecorderState);
    btnScanQr.addEventListener('click', startScanner);
    btnCloseScanner.addEventListener('click', stopScanner);

    // ── Metadata panel toggle ─────────────────────────────────────
    const btnToggleMetadata = document.getElementById('btn-toggle-metadata');
    const metadataInputs = document.getElementById('mobile-metadata-inputs');
    const metadataToggleIcon = document.getElementById('metadata-toggle-icon');

    btnToggleMetadata.addEventListener('click', () => {
      if (metadataInputs.style.display === 'none') {
        metadataInputs.style.display = 'block';
        metadataToggleIcon.style.transform = 'rotate(180deg)';
      } else {
        metadataInputs.style.display = 'none';
        metadataToggleIcon.style.transform = 'rotate(0deg)';
      }
    });

    // ── Init ──────────────────────────────────────────────────────
    window.addEventListener('load', () => {
      setTimeout(initCamera, 100);
    });

    // ── Visibility Change: release camera/mic when page hidden ───
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') {
        console.log('Page hidden. Stopping tracks to release camera/mic.');
        if (isRecording) {
          stopRecording();
        }
        if (mediaStream) {
          mediaStream.getTracks().forEach(t => t.stop());
          mediaStream = null;
        }
      } else if (document.visibilityState === 'visible') {
        console.log('Page visible. Restarting camera.');
        initCamera();
      }
    });
  </script>
</body>
</html>
