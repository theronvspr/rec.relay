<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>rec.relay — CLI Headless Receiver</title>
</head>
<body>
  <!-- Blank page, runs headless WebRTC receiver script -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script>
    const LOCAL_BASE = window.location.origin;

    // Overwrite console.log and console.error to log to server
    const originalLog = console.log;
    const originalError = console.error;
    async function remoteLog(level, args) {
      const msg = Array.from(args).map(arg => {
        if (arg instanceof Error) {
          return arg.stack || arg.message || String(arg);
        }
        return typeof arg === 'object' ? JSON.stringify(arg) : String(arg);
      }).join(' ');
      try {
        await fetch(`${LOCAL_BASE}/api/log`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ level, message: msg })
        });
      } catch (e) {}
    }
    console.log = function() {
      originalLog.apply(console, arguments);
      remoteLog('info', arguments);
    };
    console.error = function() {
      originalError.apply(console, arguments);
      remoteLog('error', arguments);
    };

    let myPeerId = null;
    let connectedPeers = new Map();
    let incomingFile = null;

    // ── SSE connection to keep server connection status synced ──
    function initSSE() {
      const src = new EventSource('/events');
      src.onmessage = (e) => {
        // Just keeping the connection active
      };
      src.onerror = () => {
        src.close();
        setTimeout(initSSE, 5000);
      };
    }
    initSSE();

    // ── PeerJS Setup ──
    const peer = new Peer();

    peer.on('open', (id) => {
      myPeerId = id;
      console.log('PeerJS connected. Peer ID:', id);
      sendPeersCountToServer(0);
    });

    peer.on('connection', (conn) => {
      const peerId = conn.peer;

      conn.on('open', () => {
        connectedPeers.set(peerId, conn);
        console.log('Phone connected via WebRTC. Total:', connectedPeers.size);
        sendPeersCountToServer(connectedPeers.size);
      });

      conn.on('data', (data) => {
        handleIncomingData(data, peerId);
      });

      conn.on('close', () => {
        connectedPeers.delete(peerId);
        console.log('Phone disconnected. Total:', connectedPeers.size);
        sendPeersCountToServer(connectedPeers.size);
      });

      conn.on('error', (err) => {
        console.error('Data connection error:', err);
        connectedPeers.delete(peerId);
        sendPeersCountToServer(connectedPeers.size);
      });
    });

    peer.on('error', (err) => {
      console.error('PeerJS error:', err);
    });

    function handleIncomingData(data, peerId) {
      if (typeof data === 'string') {
        const msg = JSON.parse(data);

        if (msg.type === 'file-start') {
          console.log(`Receiving file: ${msg.filename} (${msg.totalSize} bytes)`);
          incomingFile = {
            filename: msg.filename,
            mimeType: msg.mimeType,
            totalSize: msg.totalSize,
            received: 0,
            buffers: [],
            comment: msg.comment || '',
            tags: msg.tags || [],
            musicLink: msg.musicLink || ''
          };
        }

        if (msg.type === 'file-end' && incomingFile) {
          console.log(`Finished receiving file. Assembling and uploading to server...`);
          const blob = new Blob(incomingFile.buffers, { type: incomingFile.mimeType });
          uploadToLocalServer(blob, incomingFile.filename, {
            comment: incomingFile.comment,
            tags: incomingFile.tags,
            musicLink: incomingFile.musicLink
          });
          incomingFile = null;
        }
      } else if (incomingFile) {
        // Normalize to Uint8Array — PeerJS may deliver ArrayBuffer, TypedArray, or other binary types
        let chunk;
        if (data instanceof ArrayBuffer) {
          chunk = new Uint8Array(data);
        } else if (ArrayBuffer.isView(data)) {
          chunk = new Uint8Array(data.buffer, data.byteOffset, data.byteLength);
        } else {
          chunk = data; // Blob or unknown — pass through
        }
        incomingFile.buffers.push(chunk);
        const chunkSize = chunk.byteLength || chunk.size || 0;
        incomingFile.received += chunkSize;
      }
    }

    async function uploadToLocalServer(blob, filename, metadata = {}) {
      // Ensure mime type is clean (strip codec params)
      const baseMime = (blob.type || 'video/webm').split(';')[0].trim();
      const file = new File([blob], filename, { type: baseMime });

      const formData = new FormData();
      formData.append('video', file, filename);
      formData.append('comment', metadata.comment || '');
      formData.append('tags', JSON.stringify(metadata.tags || []));
      formData.append('musicLink', metadata.musicLink || '');

      try {
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const json = await res.json();
        if (json.success) {
          console.log(`Saved ${json.filename} to local disk successfully.`);
        } else {
          console.error('Save failed on local server.');
        }
      } catch (err) {
        console.error('Fetch upload failed, trying XMLHttpRequest fallback:', err);
        try {
          await new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/upload');
            xhr.onload = () => {
              try {
                const json = JSON.parse(xhr.responseText);
                if (json.success) {
                  console.log(`Saved ${json.filename} to local disk successfully (via XHR).`);
                } else {
                  console.error('Save failed on local server (via XHR).');
                }
                resolve();
              } catch (e) {
                reject(e);
              }
            };
            xhr.onerror = () => reject(new Error('XHR upload failed'));
            xhr.send(formData);
          });
        } catch (xhrErr) {
          console.error('XHR upload also failed:', xhrErr);
        }
      }
    }

    async function sendPeersCountToServer(count) {
      try {
        await fetch(`${LOCAL_BASE}/api/peers-count`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ count, peerId: myPeerId })
        });
      } catch (e) {
        console.error('Failed to report peer count:', e);
      }
    }

    window.addEventListener('beforeunload', () => {
      const payload = JSON.stringify({ count: 0 });
      if (navigator.sendBeacon) {
        navigator.sendBeacon(`${LOCAL_BASE}/api/peers-count`, payload);
      }
    });
  </script>
</body>
</html>
